<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 300px;
  background: #1a1a1a;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 20px;
}
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.header h1 { font-size: 18px; color: #4ecdc4; }
.header img { width: 28px; height: 28px; }
.status {
  background: #111;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 16px;
  font-size: 13px;
  color: #888;
  text-align: center;
}
.status strong { color: #4ecdc4; }
.btn-group { display: flex; flex-direction: column; gap: 8px; }
.btn {
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
}
.btn-primary { background: #4ecdc4; color: #000; }
.btn-primary:hover { background: #45b8b0; }
.btn-secondary { background: #2a2a2a; color: #ccc; }
.btn-secondary:hover { background: #333; }
.btn-danger { background: #2a1a1a; color: #ff6b6b; }
.btn-danger:hover { background: #3a1a1a; }
.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding: 8px 0;
  font-size: 13px;
  color: #888;
}
.switch { position: relative; width: 36px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #333;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}
.slider:before {
  content: "";
  position: absolute;
  height: 14px; width: 14px;
  left: 3px; bottom: 3px;
  background: #888;
  border-radius: 50%;
  transition: 0.3s;
}
.switch input:checked + .slider { background: #4ecdc4; }
.switch input:checked + .slider:before { transform: translateX(16px); background: #fff; }
.shortcuts {
  margin-top: 16px;
  border-top: 1px solid #333;
  padding-top: 12px;
}
.shortcut {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 4px 0;
  color: #666;
}
.shortcut kbd {
  background: #2a2a2a;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: monospace;
  color: #aaa;
}
.footer {
  margin-top: 16px;
  text-align: center;
  font-size: 11px;
  color: #444;
}
</style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon48.png" alt="FillFaker" onerror="this.style.display='none'">
    <h1>FillFaker</h1>
  </div>

  <div class="status" id="status">Loading...</div>

  <div class="btn-group">
    <button class="btn btn-primary" id="fillBtn">Fill All Forms</button>
    <button class="btn btn-secondary" id="fillFormBtn">Fill This Form</button>
    <button class="btn btn-secondary" id="regenBtn">Regenerate &amp; Fill</button>
    <button class="btn btn-danger" id="clearBtn">Clear All</button>
  </div>

  <div class="toggle-row">
    <span>Only fill empty fields</span>
    <label class="switch">
      <input type="checkbox" id="onlyEmptyCheck">
      <span class="slider"></span>
    </label>
  </div>

  <div class="shortcuts">
    <div class="shortcut"><span>Fill all</span><kbd>Alt+F</kbd></div>
    <div class="shortcut"><span>Fill form</span><kbd>Alt+Shift+F</kbd></div>
    <div class="shortcut"><span>Regenerate</span><kbd>Alt+G</kbd></div>
    <div class="shortcut"><span>Clear all</span><kbd>Alt+X</kbd></div>
  </div>

  <div class="footer">FillFaker v1.0 &middot; One-time $1.99</div>

  <script src="../ExtPay.js"></script>
  <script src="popup.js"></script>
</body>
</html>
